job_name: cold_bar_archival
mode: archive
dry_run: false

storage:
  parquet_root: data/parquet/price-data
  duckdb_path: data/duckdb/market_data.duckdb

postgres:
  enabled: true
  host: 127.0.0.1
  port: 5432
  database: trading_app
  user: trading_user
  password: trading_pass
  schema: market_data
  bars_table: daily_bars
  # Must match the value in market_data.backfill.yaml so both jobs agree
  # on where the hot/cold boundary sits.
  hot_window_months: 6
