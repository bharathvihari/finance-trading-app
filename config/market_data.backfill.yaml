job_name: historical_backfill
mode: backfill
dry_run: false
fail_on_unresolved_exchange_last_traded: true

frequency:
  name: daily
  ibkr_bar_size: "1 day"

storage:
  parquet_root: data/parquet/price-data
  duckdb_path: data/duckdb/market_data.duckdb

postgres:
  enabled: true
  host: 127.0.0.1
  port: 5432
  database: trading_app
  user: trading_user
  password: trading_pass
  schema: market_data
  bars_table: daily_bars
  hot_window_months: 6

ibkr:
  host: 127.0.0.1
  port: 5000
  client_id: 1001
  account:
  gateway_mode: paper
  connect_timeout_seconds: 10.0
  fallback_enabled: true
  what_to_show: ADJUSTED_LAST
  use_regular_trading_hours: true
  timezone: UTC

rate_limits:
  max_requests_per_window: 60
  window_seconds: 600
  identical_request_cooldown_seconds: 15
  utilization_target_pct: 85
  base_delay_seconds: 0.4
  jitter_seconds: 0.6
  max_retries: 3
  backoff_base_seconds: 1.0
  max_backoff_seconds: 30.0
  backoff_jitter_seconds: 0.5

